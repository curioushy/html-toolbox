<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Toolbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0b; --surface: #141416; --surface-hover: #1c1c1f;
      --border: #27272a; --text: #fafafa; --text-muted: #a1a1aa;
      --accent: #3b82f6; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .container { max-width: 520px; margin: 0 auto; padding: 80px 24px 60px; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 40px; }
    .tools { display: flex; flex-direction: column; gap: 12px; }
    a.tool {
      display: flex; align-items: center; gap: 16px; padding: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); text-decoration: none; color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    a.tool:hover { background: var(--surface-hover); border-color: #3f3f46; }
    .icon { font-size: 24px; width: 40px; text-align: center; flex-shrink: 0; }
    .info h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .info p { font-size: 14px; color: var(--text-muted); }
    .arrow { color: var(--text-muted); font-size: 18px; margin-left: auto; transition: transform 0.15s; }
    a.tool:hover .arrow { transform: translateX(3px); }
    .footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }
    .footer a { color: var(--text-muted); text-decoration: none; } .footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <h1>HTML Toolbox</h1>
    <p class="subtitle">Standalone, zero-dependency HTML tools. Just open in a browser.</p>
    <div class="tools">
      <a href="text-cleaner.html" class="tool">
        <span class="icon">🧹</span>
        <div class="info">
          <h3>Text Cleaner</h3>
          <p>Strip formatting, fix whitespace, remove invisible characters.</p>
        </div>
        <span class="arrow">→</span>
      </a>
      <a href="text-compare.html" class="tool">
        <span class="icon">🔍</span>
        <div class="info">
          <h3>Text Compare</h3>
          <p>Side-by-side diff of two text blocks with highlighted changes.</p>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>
    <div class="footer">
      <a href="https://github.com/curioushy/html-toolbox" target="_blank" rel="noopener">Source on GitHub</a>
    </div>
  </div>
</body>
</html>
